<svg width="240" height="60" viewBox="0 0 240 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#714DFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9C83FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E151FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Brain/Mind Icon -->
  <g transform="translate(5, 15)">
    <path d="M15 5 C15 2, 18 0, 21 2 C24 0, 27 2, 27 5 C30 5, 30 8, 28 10 C30 12, 28 15, 25 15 C25 18, 22 20, 19 18 C16 20, 13 18, 13 15 C10 15, 8 12, 10 10 C8 8, 8 5, 11 5" 
          fill="url(#logoGradient)" 
          filter="url(#glow)"/>
    <circle cx="15" cy="10" r="1.5" fill="#FFF"/>
    <circle cx="23" cy="10" r="1.5" fill="#FFF"/>
    <path d="M 12 12 Q 19 14 26 12" stroke="#FFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- MediaMind Text -->
  <text x="45" y="40" font-family="'Urbanist', 'Arial', sans-serif" font-size="24" font-weight="700" fill="url(#logoGradient)" filter="url(#glow)">
    MediaMind
  </text>
  
  <!-- Animated pulse effect -->
  <circle cx="20" cy="25" r="15" fill="none" stroke="url(#logoGradient)" stroke-width="0.5" opacity="0.3">
    <animate attributeName="r" from="15" to="25" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.3" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
